name: Test-all
run-name: All tests with extension build ${{ inputs.CLIENTS_BRANCH || github.event.client_payload.origin_branch }} by @${{ github.actor }}
on:
  push:
    branches:
      - "main"
  repository_dispatch:
    types: [trigger-bit-tests]
  pull_request:
  workflow_dispatch:
    inputs:
      CLIENTS_BRANCH:
        default: "main"
        description: "clients branch of browser build to use"
        required: true
        type: string
      REMOTE_VAULT_CONFIG_MATCH:
        description: "URL to an endpoint returning a vault configuration (will default to US prod configuration)"
        required: false
        type: string
jobs:
  build-and-test:
    name: Build and test
    runs-on: ubuntu-24.04
    permissions:
      id-token: write
      contents: read
      packages: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Setup Node
        uses: actions/setup-node@1d0ff469b7ec7b3cb9d8673fde0c81c44821de2a # v4.2.0
        with:
          cache: "npm"
          cache-dependency-path: "**/package-lock.json"
          node-version: "23"

      - name: Create dotenv file
        run: |
          sudo setcap 'cap_net_bind_service=+ep' `which node`
          echo "${{ secrets.ENV_FILE }}" | base64 --decode > .env
          echo "BW_INSTALLATION_ID=${{ secrets.BW_INSTALLATION_ID }}" >> .env
          echo "BW_INSTALLATION_KEY=${{ secrets.BW_INSTALLATION_KEY }}" >> .env
          echo "REMOTE_VAULT_CONFIG_MATCH=${{ inputs.REMOTE_VAULT_CONFIG_MATCH || vars.BW_REMOTE_VAULT_CONFIG_MATCH }}" >> .env

      - name: Download extension artifact
        uses: dawidd6/action-download-artifact@09f2f74827fd3a8607589e5ad7f9398816f540fe # v3.1.4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          workflow: build-browser.yml
          workflow_conclusion: ""
          branch: ${{ github.event.client_payload.origin_branch || inputs.CLIENTS_BRANCH || 'main' }}
          name: ^dist-chrome-MV3-\w{7}\.zip$
          name_is_regexp: true
          # @TODO remove hardcoded test value
          repo: ${{ 'jprusik' || 'bitwarden' }}/clients
          if_no_artifact_found: fail
          skip_unpack: true

      - name: Comment BIT summary on originating issue
        if: github.event.client_payload.origin_issue
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          github-token: ${{ secrets.CROSS_REPO_TOKEN }}
          script: |
            // @TODO remove hardcoded test value
            const owner = 'jprusik' || 'bitwarden';
            const message = `⚠️ **Files have been modified in this PR that impact the Autofill experience:**

            [BIT](https://github.com/jprusik/browser-interactions-testing) was run to verify no regressions have been introduced to the core Autofill experience.

            You can view the detailed results of the tests [here](https://github.com/jprusik/browser-interactions-testing/actions/runs/${context.runId}).`;

            github.rest.issues.createComment({
              issue_number: context.payload.client_payload.origin_issue,
              owner: owner,
              repo: 'clients',
              body: message
            });
